  <path d="M118 136v54M128 136v54M138 136v54" fill="none" stroke="#83d8a6" stroke-opacity=".14" stroke-width="2.5" />
  <rect x="116" y="144" width="24" height="36" rx="8" fill="#ebe3d1" fill-opacity=".92" />
  <circle cx="134" cy="162" r="3.5" fill="#2f855a" />

  <g stroke="#83d8a6" stroke-linecap="round" stroke-width="8">
    <path d="M170 152h30" />
