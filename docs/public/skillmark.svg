<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Timberborn Modding Skill mark</title>
  <desc id="desc">A digital-grove skill icon with a timber house, blueprint grid, and forest-green circuitry accent.</desc>
  <defs>
    <linearGradient id="frame" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1c1e" />
      <stop offset="100%" stop-color="#0c0e10" />
    </linearGradient>
    <linearGradient id="glow" x1="62" y1="52" x2="198" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#83d8a6" stop-opacity="0.38" />
      <stop offset="50%" stop-color="#2f855a" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#2f855a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="wood" x1="80" y1="102" x2="176" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d0b07a" />
      <stop offset="52%" stop-color="#a26d3f" />
      <stop offset="100%" stop-color="#6a4526" />
    </linearGradient>
    <linearGradient id="roof" x1="74" y1="78" x2="182" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ff5c1" />
      <stop offset="100%" stop-color="#2f855a" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="52" fill="#121416" />
  <rect x="24" y="24" width="208" height="208" rx="40" fill="url(#frame)" />
  <rect x="24" y="24" width="208" height="208" rx="40" fill="url(#glow)" />

  <g stroke="#83d8a6" stroke-linecap="round" stroke-width="4">
    <path d="M168 64h18" opacity=".48" />
    <path d="M196 64h10" opacity=".28" />
    <path d="M187 55v18" opacity=".36" />
    <path d="M166 84h42" opacity=".2" />
    <path d="M166 96h30" opacity=".14" />
    <path d="M166 108h38" opacity=".18" />
    <path d="M178 84v34" opacity=".12" />
    <path d="M192 84v24" opacity=".16" />
  </g>

  <g filter="url(#softGlow)">
    <circle cx="126" cy="128" r="56" fill="#2f855a" fill-opacity=".15" />
  </g>

  <path
    d="M74 115 128 75l54 40"
